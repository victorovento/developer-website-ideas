name: Validate WEBSITES.md

on:
  pull_request:
    paths:
      - 'public/WEBSITES.md'

jobs:
  validate:
    name: Check entries format & duplicates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate WEBSITES.md
        run: node scripts/validate-websites.js
