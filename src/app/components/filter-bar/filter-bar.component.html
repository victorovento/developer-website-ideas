<div class="filter-bar" role="search" aria-label="Filter developer portfolios">
  <div class="filter-bar__search-wrap">
    <svg class="filter-bar__search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input
      class="filter-bar__search"
      type="search"
      placeholder="Search by name, owner, or role…"
      [value]="searchQuery"
      (input)="onSearch($any($event.target).value)"
      aria-label="Search portfolios"
    />
    @if (searchQuery) {
      <button class="filter-bar__clear" (click)="clearSearch()" aria-label="Clear search">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M4.293 4.293a1 1 0 011.414 0L8 6.586l2.293-2.293a1 1 0 111.414 1.414L9.414 8l2.293 2.293a1 1 0 01-1.414 1.414L8 9.414l-2.293 2.293a1 1 0 01-1.414-1.414L6.586 8 4.293 5.707a1 1 0 010-1.414z"/>
        </svg>
      </button>
    }
  </div>

  <div class="filter-bar__chips" role="group" aria-label="Filter by work title">
    @for (filter of filters; track filter) {
      <button
        class="filter-bar__chip"
        [class.filter-bar__chip--active]="activeFilter === filter"
        (click)="onFilter(filter)"
        [attr.aria-pressed]="activeFilter === filter"
      >
        {{ filter }}
      </button>
    }
  </div>

  <p class="filter-bar__count" aria-live="polite">
    Showing <strong>{{ filteredCount }}</strong> of <strong>{{ totalCount }}</strong> portfolios
  </p>
</div>
