@if (contributors.length > 0) {
  <section class="contributors" aria-labelledby="contributors-heading">
    <div class="contributors__inner">
      <div class="contributors__header">
        <h2 class="contributors__heading" id="contributors-heading">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="7" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="13" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1 17c0-3.314 2.686-6 6-6h.5M10.5 17c0-3.314 2.239-6 5-6s5 2.686 5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Community Contributors
        </h2>
        <p class="contributors__sub">
          {{ contributors.length }} people have helped build this directory
        </p>
      </div>

      <ul class="contributors__grid" aria-label="GitHub contributors">
        @for (contributor of contributors; track contributor.login) {
          <li>
            <a
              class="contributors__item"
              [href]="contributor.html_url"
              target="_blank"
              rel="noopener noreferrer"
              [title]="contributor.login + ' — ' + contributor.contributions + ' contribution' + (contributor.contributions === 1 ? '' : 's')"
              [attr.aria-label]="contributor.login"
            >
              <img
                class="contributors__avatar"
                [src]="contributor.avatar_url + '&s=64'"
                [alt]="contributor.login"
                loading="lazy"
                width="40"
                height="40"
              />
            </a>
          </li>
        }
      </ul>
    </div>
  </section>
}
