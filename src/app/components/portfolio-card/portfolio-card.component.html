<article class="card" [attr.aria-label]="portfolio.name + ' portfolio by ' + portfolio.owner">
  <div class="card__header">
    <div class="card__avatar" [attr.aria-hidden]="true">{{ initials }}</div>
    <div class="card__meta">
      <h2 class="card__name">{{ portfolio.name }}</h2>
      <p class="card__owner">{{ portfolio.owner }}</p>
    </div>
  </div>

  <div class="card__body">
    <span class="card__badge">{{ portfolio.workTitle }}</span>
    <a
      class="card__domain"
      [href]="portfolio.url"
      target="_blank"
      rel="noopener noreferrer"
      [attr.aria-label]="'Visit ' + portfolio.name"
    >
      <svg class="card__domain-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8z" fill="currentColor"/>
        <path d="M8 1.5c-1.5 0-3 2.686-3 6s1.5 6 3 6 3-2.686 3-6-1.5-6-3-6zM4 8c0-3.314 1.79-6 4-6s4 2.686 4 6-1.79 6-4 6-4-2.686-4-6z" fill="currentColor"/>
        <path d="M1.5 6h13v1H1.5V6zM1.5 9h13v1H1.5V9z" fill="currentColor"/>
      </svg>
      {{ domain }}
    </a>
  </div>

  <div class="card__footer">
    <a
      class="card__btn card__btn--primary"
      [href]="portfolio.url"
      target="_blank"
      rel="noopener noreferrer"
    >
      Visit Site
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    @if (portfolio.sourceCode) {
      <a
        class="card__btn card__btn--ghost"
        [href]="portfolio.sourceCode"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View source code"
        title="View source code"
      >
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Source
      </a>
    }
  </div>
</article>
